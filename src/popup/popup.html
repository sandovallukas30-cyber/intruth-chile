<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="logo">⬡</span>
      <span class="title">InTruth Chile</span>
    </div>

    <div class="status" id="status">Inactivo</div>

    <div class="keys-section" id="keysSection">
      <div class="key-field">
        <label class="key-label">Anthropic API Key</label>
        <input class="key-input" id="anthropicKey" type="password" placeholder="sk-ant-..." autocomplete="off"/>
      </div>

      <div class="key-field">
        <label class="key-label">Deepgram API Key <span class="key-label-req">requerido</span></label>
        <input class="key-input" id="deepgramKey" type="password" placeholder="Token deepgram..." autocomplete="off"/>
      </div>

      <div class="key-field">
        <label class="key-label">Serper API Key <span class="key-label-opt">opcional</span></label>
        <input class="key-input" id="serperKey" type="password" placeholder="Token serper..." autocomplete="off"/>
      </div>

      <div class="key-field">
        <label class="key-label">Idioma</label>
        <div class="lang-row">
          <span id="langFlag" class="lang-flag">🇨🇱</span>
          <select class="key-input key-select" id="languageSelect">
            <option value="es" selected>es</option>
            <option value="en">en</option>
            <option value="pt">pt</option>
            <option value="fr">fr</option>
            <option value="de">de</option>
            <option value="it">it</option>
          </select>
        </div>
      </div>

      <div class="key-hint" id="keyHint"></div>
    </div>

    <button class="toggle-btn" id="toggleBtn">Iniciar Fact-Checking</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
